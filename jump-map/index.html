<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점프맵</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="../index.html" class="nav-home">홈</a>
        <div class="nav-games">
            <a href="../jigsaw-puzzle/index.html">퍼즐</a>
            <a href="../memory-game/index.html">메모리</a>
            <a href="../oasis-knight/index.html">나이트</a>
            <span class="nav-current">점프맵</span>
        </div>
    </nav>

    <!-- 캐릭터 선택 화면 -->
    <div id="select-screen">
        <h1>점프맵</h1>
        <p class="desc">캐릭터를 골라보세요!</p>
        <div class="emoji-grid" id="emoji-grid"></div>
        <div class="preview-area">
            <span id="preview-emoji">?</span>
            <button id="start-btn" disabled>게임 시작!</button>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="hidden">
        <div class="game-hud">
            <span id="level-label">레벨 1</span>
            <span id="hud-emoji"></span>
            <button id="restart-btn">다시시작</button>
        </div>
        <div class="canvas-wrap">
            <canvas id="game-canvas"></canvas>
        </div>
        <div class="mobile-controls">
            <div class="mc-left">
                <button class="mc-btn" id="btn-left">◀</button>
                <button class="mc-btn" id="btn-right">▶</button>
            </div>
            <button class="mc-btn mc-jump" id="btn-jump">점프</button>
        </div>
    </div>

    <!-- 레벨 클리어 화면 -->
    <div id="clear-screen" class="hidden overlay">
        <div class="popup">
            <div class="popup-emoji" id="clear-emoji"></div>
            <h2 id="clear-title"></h2>
            <p id="clear-msg"></p>
            <button id="next-btn">다음 레벨 →</button>
        </div>
    </div>

    <!-- 전체 클리어 화면 -->
    <div id="complete-screen" class="hidden overlay">
        <div class="popup">
            <div class="popup-emoji" id="complete-emoji"></div>
            <h2>모든 레벨 클리어!</h2>
            <p>대단해요! 진정한 점프 마스터!</p>
            <button id="replay-btn">처음부터</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
