<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸 제천 가족 여행</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --pink:    #FF85A1;
      --pink-d:  #e0607e;
      --purple:  #C77DFF;
      --purple-d:#a055e0;
      --mint:    #5CE0C8;
      --peach:   #FF9F43;
      --blue:    #54A0FF;
      --red:     #FF6B6B;
      --green:   #26de81;
      --bg:      #FFF0F7;
      --card:    #FFFFFF;
      --text:    #2d2d2d;
      --sub:     #888;
      --border:  #F0D6E8;
      --day1:    #FF85A1;
      --day2:    #9B8FFF;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ──────────────────────────────────── */
    #header {
      background: linear-gradient(135deg, #FF85A1 0%, #C77DFF 100%);
      color: white;
      padding: 12px 18px 10px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(199,125,255,0.35);
    }
    #header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    #header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header-title h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    #header-title .date-badge {
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }
    #header-stats {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: rgba(255,255,255,0.22);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #nearby-toggle-btn {
      background: rgba(255,255,255,0.28);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 4px 12px;
      color: white;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #nearby-toggle-btn:hover { background: rgba(255,255,255,0.38); }

    /* ── MAIN LAYOUT ──────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ──────────────────────────────────── */
    #sidebar {
      width: 320px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* Day Tabs */
    #day-tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .day-tab {
      flex: 1;
      padding: 10px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .day-tab:hover { color: var(--pink); }
    .day-tab.active {
      color: var(--pink);
      border-bottom-color: var(--pink);
    }
    .day-tab.active.day2 {
      color: var(--day2);
      border-bottom-color: var(--day2);
    }
    .day-tab span.tab-date { display: block; font-size: 10px; font-weight: 500; margin-top: 1px; opacity: 0.7; }

    /* Timeline scroll area */
    #timeline-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 20px;
    }
    #timeline-area::-webkit-scrollbar { width: 4px; }
    #timeline-area::-webkit-scrollbar-thumb { background: #F0C8D8; border-radius: 4px; }

    /* Timeline */
    .timeline { position: relative; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 18px;
      top: 24px;
      bottom: 24px;
      width: 2px;
      background: linear-gradient(to bottom, var(--day1), var(--day2));
      opacity: 0.3;
      border-radius: 2px;
    }
    .timeline.day2::before {
      background: linear-gradient(to bottom, var(--day2), #b5b5ff);
    }

    .stop-card {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      position: relative;
    }

    .stop-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .stop-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      flex-shrink: 0;
      transition: transform 0.2s;
      z-index: 1;
    }
    .stop-card:hover .stop-dot { transform: scale(1.12); }
    .stop-connector {
      width: 2px;
      flex: 1;
      min-height: 8px;
      background: var(--border);
      margin-top: 3px;
      margin-bottom: 3px;
    }

    .stop-body {
      flex: 1;
      background: white;
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 2px 10px rgba(255,133,161,0.1);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .stop-card:hover .stop-body {
      box-shadow: 0 4px 18px rgba(255,133,161,0.22);
      transform: translateY(-1px);
    }
    .stop-card.active .stop-body {
      border-color: var(--pink);
      box-shadow: 0 4px 18px rgba(255,133,161,0.35);
    }
    .stop-card.active.day2 .stop-body {
      border-color: var(--day2);
      box-shadow: 0 4px 18px rgba(155,143,255,0.35);
    }

    .stop-time-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .stop-time {
      font-size: 10px;
      color: var(--sub);
      font-weight: 600;
    }
    .stop-dur-badge {
      font-size: 9px;
      color: #aaa;
      background: #f7f7f7;
      border-radius: 8px;
      padding: 1px 6px;
    }
    .stop-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .stop-desc {
      font-size: 11px;
      color: #777;
      line-height: 1.5;
    }
    .stop-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .tag-free    { background: #e8f9f0; color: #27ae60; }
    .tag-paid    { background: #fff3e0; color: #e67e22; }
    .tag-preg    { background: #fce4ec; color: #e91e63; }
    .tag-kids    { background: #e8eaf6; color: #5c6bc0; }
    .tag-warn    { background: #fff3cd; color: #d68910; }
    .tag-food    { background: #fff0e8; color: #e05c2a; }
    .tag-hotel   { background: #fde; color: #c0392b; }
    .tag-drive   { background: #e8f4fd; color: #2980b9; }

    .stop-warn-row {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      margin-top: 6px;
      background: #FFF8F0;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 11px;
      color: #e67e22;
      font-weight: 600;
    }

    /* Travel time indicator between cards */
    .travel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0 2px 46px;
      margin-bottom: 4px;
    }
    .travel-line { flex: 1; height: 1px; background: var(--border); }
    .travel-label {
      font-size: 10px;
      color: #bbb;
      white-space: nowrap;
      font-weight: 600;
    }

    /* ── MAP ─────────────────────────────────────── */
    #map { flex: 1; }

    /* ── NEARBY PANEL ────────────────────────────── */
    #nearby-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 250px;
      max-height: 400px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(199,125,255,0.25);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #F0D6E8;
    }
    #nearby-panel-head {
      background: linear-gradient(135deg, #FF85A1, #C77DFF);
      padding: 12px 14px 10px;
      color: white;
    }
    #nearby-panel-head h3 { font-size: 13px; font-weight: 800; }
    #nearby-panel-head p  { font-size: 10px; opacity: 0.85; margin-top: 1px; }
    #cat-filters {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #cat-filters::-webkit-scrollbar { display: none; }
    .cat-btn {
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      cursor: pointer;
      background: #f5f5f5;
      color: #888;
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .cat-btn.active {
      background: #FFF0F7;
      color: var(--pink);
      border-color: var(--pink);
    }
    #nearby-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }
    #nearby-list::-webkit-scrollbar { width: 3px; }
    #nearby-list::-webkit-scrollbar-thumb { background: #F0C8D8; border-radius: 3px; }
    .nearby-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      border-bottom: 1px solid #faf0f5;
      transition: background 0.15s;
    }
    .nearby-item:hover { background: #FFF8FC; }
    .nearby-emoji {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .nearby-info { flex: 1; }
    .nearby-name { font-size: 12px; font-weight: 700; color: var(--text); }
    .nearby-cat  { font-size: 10px; font-weight: 600; margin-bottom: 2px; }
    .nearby-desc { font-size: 10px; color: #999; line-height: 1.4; }

    /* ── POPUP STYLES ────────────────────────────── */
    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 0;
      overflow: hidden;
    }
    .custom-popup .leaflet-popup-content { margin: 0; min-width: 210px; }
    .custom-popup .leaflet-popup-tip-container { display: none; }
    .popup-head {
      padding: 10px 14px 8px;
      color: white;
      font-weight: 800;
      font-size: 14px;
    }
    .popup-body {
      padding: 8px 14px 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #333;
    }
    .popup-time { color: #aaa; font-size: 10px; margin-bottom: 4px; font-weight: 600; }
    .popup-warn {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      margin-top: 6px;
      background: #FFF8F0;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      color: #e67e22;
      font-weight: 600;
    }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 640px) {
      #main { flex-direction: column; }
      #sidebar { width: 100%; height: 260px; min-width: unset; }
      #map { height: 0; flex: 1; }
      #nearby-panel { width: calc(100% - 28px); left: 14px; right: 14px; bottom: 14px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<div id="header">
  <div id="header-top">
    <div id="header-title">
      <h1>🌸 제천 가족 여행</h1>
      <span class="date-badge">3/28 – 29</span>
    </div>
    <button id="nearby-toggle-btn" onclick="toggleNearby()">📍 주변 명소</button>
  </div>
  <div id="header-stats">
    <div class="stat-chip">👨‍👩‍👧‍👧 가족 일행</div>
    <div class="stat-chip">🚗 차량 2대</div>
    <div class="stat-chip">🌙 1박 2일</div>
    <div class="stat-chip">🤰 임산부 동반</div>
    <div class="stat-chip">🎀 초등학생 동반</div>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="main">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar">
    <div id="day-tabs">
      <div class="day-tab active" id="tab-day1" onclick="showDay(1)">
        🌷 Day 1
        <span class="tab-date">3/28 토요일</span>
      </div>
      <div class="day-tab day2" id="tab-day2" onclick="showDay(2)">
        🌿 Day 2
        <span class="tab-date">3/29 일요일</span>
      </div>
    </div>
    <div id="timeline-area">
      <div class="timeline" id="timeline-day1"></div>
      <div class="timeline day2" id="timeline-day2" style="display:none;"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<!-- ── NEARBY PANEL ── -->
<div id="nearby-panel" style="display:none;">
  <div id="nearby-panel-head">
    <h3>✨ 주변 추천 명소</h3>
    <p>일정 외 들르기 좋은 곳들</p>
  </div>
  <div id="cat-filters">
    <div class="cat-btn active" onclick="filterCat(this,'전체')">전체</div>
    <div class="cat-btn" onclick="filterCat(this,'자연')">🌿 자연</div>
    <div class="cat-btn" onclick="filterCat(this,'역사')">🏛 역사</div>
    <div class="cat-btn" onclick="filterCat(this,'레저')">🎢 레저</div>
    <div class="cat-btn" onclick="filterCat(this,'드라이브')">🚗 드라이브</div>
  </div>
  <div id="nearby-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ── MAP INIT ────────────────────────────────────────────────────────────────

// ── MARKER FACTORY ──────────────────────────────────────────────────────────

function makeStopMarker(stop) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:36px; height:36px; border-radius:50%;
      background:${stop.color};
      border:3px solid white;
      box-shadow:0 3px 10px rgba(0,0,0,0.25);
      display:flex; align-items:center; justify-content:center;
      font-size:14px;
    ">${stop.icon}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22]
  });

  const tagsHtml = (stop.tags || []).map(tag =>
    `<span style="font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;background:#fff0f7;color:#e0607e;">${tag.t}</span>`
  ).join('');

  const warnHtml = stop.warn
    ? `<div style="margin-top:6px;background:#fff8f0;border-radius:8px;padding:5px 8px;font-size:11px;color:#e67e22;font-weight:600;">${stop.warn}</div>`
    : '';

  const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(map);
  marker.bindPopup(`
    <div>
      <div class="popup-head" style="background:${stop.color}">${stop.icon} ${stop.name}</div>
      <div class="popup-body">
        <div class="popup-time">${stop.time}</div>
        <div style="font-size:12px;line-height:1.6;">${stop.desc}</div>
        ${tagsHtml ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${tagsHtml}</div>` : ''}
        ${warnHtml}
      </div>
    </div>
  `, { className: 'custom-popup', maxWidth: 270 });

  return marker;
}

// ── BUILD MARKERS ────────────────────────────────────────────────────────────

const day1Markers = day1Stops.map(stop => makeStopMarker(stop));
const day2Markers = day2Stops.map(stop => makeStopMarker(stop));

const allCoords = [...day1Stops, ...day2Stops].map(s => [s.lat, s.lng]);
map.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });

// ── SIDEBAR TIMELINE BUILDER ─────────────────────────────────────────────────

let currentDay = 1;

function buildTimeline(stops, markers, containerId, isDay2) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  stops.forEach((stop, i) => {
    const card = document.createElement('div');
    card.className = 'stop-card' + (isDay2 ? ' day2' : '');
    card.dataset.idx = i;

    const tagsHtml = (stop.tags || []).map(tag =>
      `<span class="tag tag-${tag.c}">${tag.t}</span>`
    ).join('');

    const warnHtml = stop.warn
      ? `<div class="stop-warn-row">⚠️ <span>${stop.warn}</span></div>`
      : '';

    const durHtml = stop.dur
      ? `<span class="stop-dur-badge">⏱ ${stop.dur}</span>`
      : '';

    card.innerHTML = `
      <div class="stop-dot-col">
        <div class="stop-dot" style="background:${stop.color}">${stop.icon}</div>
        ${i < stops.length - 1 ? '<div class="stop-connector"></div>' : ''}
      </div>
      <div class="stop-body">
        <div class="stop-time-row">
          <span class="stop-time">${stop.time}</span>
          ${durHtml}
        </div>
        <div class="stop-name">${stop.name}</div>
        <div class="stop-desc">${stop.desc}</div>
        ${tagsHtml ? `<div class="stop-tags">${tagsHtml}</div>` : ''}
        ${warnHtml}
      </div>
    `;

    card.addEventListener('click', () => {
      container.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      map.flyTo([stop.lat, stop.lng], 14, { duration: 1.2 });
      markers[i].openPopup();
    });

    container.appendChild(card);

    if (stop.travelAfter && i < stops.length - 1) {
      const tr = document.createElement('div');
      tr.className = 'travel-row';
      tr.innerHTML = `<span class="travel-label">🚗 ${stop.travelAfter}</span><div class="travel-line"></div>`;
      container.appendChild(tr);
    }
  });

  markers.forEach((m, i) => {
    m.on('click', () => {
      if (currentDay !== (isDay2 ? 2 : 1)) showDay(isDay2 ? 2 : 1);
      setTimeout(() => {
        const cards = container.querySelectorAll('.stop-card');
        cards.forEach(c => c.classList.remove('active'));
        if (cards[i]) {
          cards[i].classList.add('active');
          cards[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }, 50);
    });
  });
}

buildTimeline(day1Stops, day1Markers, 'timeline-day1', false);
buildTimeline(day2Stops, day2Markers, 'timeline-day2', true);

// ── NEARBY PANEL ─────────────────────────────────────────────────────────────

function buildNearbyList(filter) {
  const list = document.getElementById('nearby-list');
  list.innerHTML = '';
  const filtered = filter === '전체'
    ? refPlaces
    : refPlaces.filter(p => p.cat === filter);

  filtered.forEach((p) => {
    const idx = refPlaces.indexOf(p);
    const el = document.createElement('div');
    el.className = 'nearby-item';
    el.innerHTML = `
      <div class="nearby-emoji" style="background:${p.bgColor};">${p.icon}</div>
      <div class="nearby-info">
        <div class="nearby-cat" style="color:${p.textColor};">${p.cat}</div>
        <div class="nearby-name">${p.name}</div>
        <div class="nearby-desc">${p.desc}</div>
      </div>
    `;
    el.addEventListener('click', () => {
      map.flyTo([p.lat, p.lng], 15, { duration: 1.2 });
      refMarkers[idx].openPopup();
    });
    list.appendChild(el);
  });
}

buildNearbyList('전체');

function filterCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildNearbyList(cat);
}

// ── TOGGLE NEARBY ────────────────────────────────────────────────────────────

function toggleNearby() {
  refVisible = !refVisible;
  const panel = document.getElementById('nearby-panel');
  const btn = document.getElementById('nearby-toggle-btn');
  panel.style.display = refVisible ? 'flex' : 'none';
  panel.style.flexDirection = 'column';
  btn.textContent = refVisible ? '✕ 명소 닫기' : '📍 주변 명소';
  refMarkers.forEach(m => refVisible ? m.addTo(map) : map.removeLayer(m));
}

// ── DAY SWITCH ───────────────────────────────────────────────────────────────

function showDay(day) {
  currentDay = day;
  document.getElementById('timeline-day1').style.display = day === 1 ? '' : 'none';
  document.getElementById('timeline-day2').style.display = day === 2 ? '' : 'none';
  document.getElementById('tab-day1').classList.toggle('active', day === 1);
  document.getElementById('tab-day2').classList.toggle('active', day === 2);

  const focusStops = day === 1 ? day1Stops : day2Stops;
  const coords = focusStops.map(s => [s.lat, s.lng]);
  map.fitBounds(L.latLngBounds(coords), { padding: [50, 50], maxZoom: 12 });
}
