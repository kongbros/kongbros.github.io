<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸 제천 가족 여행</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --pink:    #FF85A1;
      --pink-d:  #e0607e;
      --purple:  #C77DFF;
      --purple-d:#a055e0;
      --mint:    #5CE0C8;
      --peach:   #FF9F43;
      --blue:    #54A0FF;
      --red:     #FF6B6B;
      --green:   #26de81;
      --bg:      #FFF0F7;
      --card:    #FFFFFF;
      --text:    #2d2d2d;
      --sub:     #888;
      --border:  #F0D6E8;
      --day1:    #FF85A1;
      --day2:    #9B8FFF;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ──────────────────────────────────── */
    #header {
      background: linear-gradient(135deg, #FF85A1 0%, #C77DFF 100%);
      color: white;
      padding: 12px 18px 10px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(199,125,255,0.35);
    }
    #header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    #header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header-title h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    #header-title .date-badge {
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }
    #header-stats {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: rgba(255,255,255,0.22);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #nearby-toggle-btn {
      background: rgba(255,255,255,0.28);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 4px 12px;
      color: white;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #nearby-toggle-btn:hover { background: rgba(255,255,255,0.38); }

    /* ── MAIN LAYOUT ──────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ──────────────────────────────────── */
    #sidebar {
      width: 320px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* Day Tabs */
    #day-tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .day-tab {
      flex: 1;
      padding: 10px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .day-tab:hover { color: var(--pink); }
    .day-tab.active {
      color: var(--pink);
      border-bottom-color: var(--pink);
    }
    .day-tab.active.day2 {
      color: var(--day2);
      border-bottom-color: var(--day2);
    }
    .day-tab span.tab-date { display: block; font-size: 10px; font-weight: 500; margin-top: 1px; opacity: 0.7; }

    /* Timeline scroll area */
    #timeline-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 20px;
    }
    #timeline-area::-webkit-scrollbar { width: 4px; }
    #timeline-area::-webkit-scrollbar-thumb { background: #F0C8D8; border-radius: 4px; }

    /* Timeline */
    .timeline { position: relative; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 18px;
      top: 24px;
      bottom: 24px;
      width: 2px;
      background: linear-gradient(to bottom, var(--day1), var(--day2));
      opacity: 0.3;
      border-radius: 2px;
    }
    .timeline.day2::before {
      background: linear-gradient(to bottom, var(--day2), #b5b5ff);
    }

    .stop-card {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      position: relative;
    }

    .stop-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .stop-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      flex-shrink: 0;
      transition: transform 0.2s;
      z-index: 1;
    }
    .stop-card:hover .stop-dot { transform: scale(1.12); }
    .stop-connector {
      width: 2px;
      flex: 1;
      min-height: 8px;
      background: var(--border);
      margin-top: 3px;
      margin-bottom: 3px;
    }

    .stop-body {
      flex: 1;
      background: white;
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 2px 10px rgba(255,133,161,0.1);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .stop-card:hover .stop-body {
      box-shadow: 0 4px 18px rgba(255,133,161,0.22);
      transform: translateY(-1px);
    }
    .stop-card.active .stop-body {
      border-color: var(--pink);
      box-shadow: 0 4px 18px rgba(255,133,161,0.35);
    }
    .stop-card.active.day2 .stop-body {
      border-color: var(--day2);
      box-shadow: 0 4px 18px rgba(155,143,255,0.35);
    }

    .stop-time-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .stop-time {
      font-size: 10px;
      color: var(--sub);
      font-weight: 600;
    }
    .stop-dur-badge {
      font-size: 9px;
      color: #aaa;
      background: #f7f7f7;
      border-radius: 8px;
      padding: 1px 6px;
    }
    .stop-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .stop-desc {
      font-size: 11px;
      color: #777;
      line-height: 1.5;
    }
    .stop-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .tag-free    { background: #e8f9f0; color: #27ae60; }
    .tag-paid    { background: #fff3e0; color: #e67e22; }
    .tag-preg    { background: #fce4ec; color: #e91e63; }
    .tag-kids    { background: #e8eaf6; color: #5c6bc0; }
    .tag-warn    { background: #fff3cd; color: #d68910; }
    .tag-food    { background: #fff0e8; color: #e05c2a; }
    .tag-hotel   { background: #fde; color: #c0392b; }
    .tag-drive   { background: #e8f4fd; color: #2980b9; }

    .stop-warn-row {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      margin-top: 6px;
      background: #FFF8F0;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 11px;
      color: #e67e22;
      font-weight: 600;
    }

    /* 상단 경고 배지 */
    .warn-top-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #FFF3CD;
      color: #d68910;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
      margin-bottom: 5px;
      border: 1px solid #ffe08a;
    }

    /* 진행중 배지 */
    .now-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #FF85A1, #C77DFF);
      color: white;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 10px;
      margin-bottom: 5px;
      animation: nowPulse 2s ease-in-out infinite;
    }
    @keyframes nowPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* 임산부 정보 행 */
    .preg-info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed #F0D6E8;
    }
    .preg-info-chip {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: #c0426e;
      background: #fff0f7;
      border-radius: 8px;
      padding: 2px 7px;
    }

    /* 카카오맵 네비 버튼 — 콤팩트 우측 정렬 */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      background: #FEE500;
      color: #3C1E1E;
      font-size: 10px;
      font-weight: 700;
      border-radius: 20px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .nav-btn:hover { opacity: 0.85; }

    /* 다녀왔어요 체크 버튼 */
    .check-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      background: #f0f0f0;
      color: #888;
      font-size: 10px;
      font-weight: 700;
      border-radius: 20px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .check-btn:hover { background: #e0f7ee; color: #27ae60; }
    .stop-card.checked .check-btn {
      background: #e0f7ee;
      color: #27ae60;
    }
    .stop-card.checked .stop-body {
      opacity: 0.6;
    }
    .stop-card.checked .stop-dot {
      filter: grayscale(0.4);
    }

    /* 진행률 바 */
    #progress-bar-wrap {
      padding: 6px 14px 0;
      flex-shrink: 0;
    }
    #progress-label {
      font-size: 10px;
      color: var(--sub);
      font-weight: 600;
      margin-bottom: 3px;
    }
    #progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* 비상 연락처 버튼 */
    #emergency-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
      background: white;
      border: 2px solid #FF6B6B;
      border-radius: 20px;
      padding: 6px 14px;
      color: #FF6B6B;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(255,107,107,0.3);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
    }
    #emergency-btn:hover { background: #FF6B6B; color: white; }

    #emergency-panel {
      position: absolute;
      bottom: 60px;
      left: 20px;
      z-index: 1000;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(255,107,107,0.2);
      border: 1.5px solid #ffd5d5;
      width: 240px;
      overflow: hidden;
      display: none;
    }
    #emergency-panel-head {
      background: linear-gradient(135deg, #FF6B6B, #FF9F43);
      padding: 10px 14px;
      color: white;
      font-size: 12px;
      font-weight: 800;
    }
    .emergency-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid #fff0f0;
      font-size: 11px;
    }
    .emergency-item:last-child { border-bottom: none; }
    .emergency-name { font-weight: 600; color: var(--text); }
    .emergency-actions { display: flex; gap: 6px; }
    .emergency-call {
      background: #fff0f0;
      color: #FF6B6B;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
      text-decoration: none;
      white-space: nowrap;
    }
    .emergency-map {
      background: #FEE500;
      color: #3C1E1E;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
      text-decoration: none;
      white-space: nowrap;
    }

    /* 마커 활성 링 */
    @keyframes markerRing {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .marker-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid var(--pink);
      animation: markerRing 1.2s ease-out infinite;
      pointer-events: none;
    }
    .marker-ring.day2 { border-color: var(--day2); }

    /* Travel time indicator between cards */
    .travel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0 2px 46px;
      margin-bottom: 4px;
    }
    .travel-line { flex: 1; height: 1px; background: var(--border); }
    .travel-label {
      font-size: 10px;
      color: #bbb;
      white-space: nowrap;
      font-weight: 600;
    }

    /* ── MAP ─────────────────────────────────────── */
    #map { flex: 1; }

    /* ── NEARBY PANEL ────────────────────────────── */
    #nearby-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 250px;
      max-height: 400px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(199,125,255,0.25);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #F0D6E8;
    }
    #nearby-panel-head {
      background: linear-gradient(135deg, #FF85A1, #C77DFF);
      padding: 12px 14px 10px;
      color: white;
    }
    #nearby-panel-head h3 { font-size: 13px; font-weight: 800; }
    #nearby-panel-head p  { font-size: 10px; opacity: 0.85; margin-top: 1px; }
    #cat-filters {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #cat-filters::-webkit-scrollbar { display: none; }
    .cat-btn {
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      cursor: pointer;
      background: #f5f5f5;
      color: #888;
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .cat-btn.active {
      background: #FFF0F7;
      color: var(--pink);
      border-color: var(--pink);
    }
    #nearby-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }
    #nearby-list::-webkit-scrollbar { width: 3px; }
    #nearby-list::-webkit-scrollbar-thumb { background: #F0C8D8; border-radius: 3px; }
    .nearby-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      border-bottom: 1px solid #faf0f5;
      transition: background 0.15s;
    }
    .nearby-item:hover { background: #FFF8FC; }
    .nearby-emoji {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .nearby-info { flex: 1; }
    .nearby-name { font-size: 12px; font-weight: 700; color: var(--text); }
    .nearby-cat  { font-size: 10px; font-weight: 600; margin-bottom: 2px; }
    .nearby-desc { font-size: 10px; color: #999; line-height: 1.4; }

    /* ── POPUP STYLES ────────────────────────────── */
    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 0;
      overflow: hidden;
    }
    .custom-popup .leaflet-popup-content { margin: 0; min-width: 210px; }
    .custom-popup .leaflet-popup-tip-container { display: none; }
    .popup-head {
      padding: 10px 14px 8px;
      color: white;
      font-weight: 800;
      font-size: 14px;
    }
    .popup-body {
      padding: 8px 14px 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #333;
    }
    .popup-time { color: #aaa; font-size: 10px; margin-bottom: 4px; font-weight: 600; }
    .popup-warn {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      margin-top: 6px;
      background: #FFF8F0;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      color: #e67e22;
      font-weight: 600;
    }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 640px) {
      #main { flex-direction: column; }
      #sidebar { width: 100%; height: 260px; min-width: unset; }
      #map { height: 0; flex: 1; }
      #nearby-panel { width: calc(100% - 28px); left: 14px; right: 14px; bottom: 14px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<div id="header">
  <div id="header-top">
    <div id="header-title">
      <h1>🌸 제천 가족 여행</h1>
      <span class="date-badge">3/28 – 29</span>
    </div>
    <button id="nearby-toggle-btn" onclick="toggleNearby()">📍 주변 명소</button>
  </div>
  <div id="header-stats">
    <div class="stat-chip">👨‍👩‍👧‍👧 7명</div>
    <div class="stat-chip">🚗 2대</div>
    <div class="stat-chip">🌙 1박 2일</div>
    <div class="stat-chip">🤰 임산부 동반</div>
    <div class="stat-chip">🎀 초등학생 동반</div>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="main">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar">
    <div id="day-tabs">
      <div class="day-tab active" id="tab-day1" onclick="showDay(1)">
        🌷 Day 1
        <span class="tab-date">3/28 토요일</span>
      </div>
      <div class="day-tab day2" id="tab-day2" onclick="showDay(2)">
        🌿 Day 2
        <span class="tab-date">3/29 일요일</span>
      </div>
    </div>
    <div id="progress-bar-wrap">
      <div id="progress-label">0 / 0 완료</div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <div id="timeline-area">
      <div class="timeline" id="timeline-day1"></div>
      <div class="timeline day2" id="timeline-day2" style="display:none;"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<!-- ── EMERGENCY BUTTON ── -->
<button id="emergency-btn" onclick="toggleEmergency()">🚨 비상 연락처</button>
<div id="emergency-panel">
  <div id="emergency-panel-head">🚨 제천 비상 연락처</div>
  <div class="emergency-item">
    <span class="emergency-name">제천의료원</span>
    <div class="emergency-actions">
      <a class="emergency-call" href="tel:043-649-6114">📞 전화</a>
      <a class="emergency-map" href="https://map.kakao.com/link/to/제천의료원,37.1429,128.2054" target="_blank">🗺️</a>
    </div>
  </div>
  <div class="emergency-item">
    <span class="emergency-name">제천성모병원 (산부인과)</span>
    <div class="emergency-actions">
      <a class="emergency-call" href="tel:043-641-1234">📞 전화</a>
      <a class="emergency-map" href="https://map.kakao.com/link/to/제천성모병원,37.1341,128.1918" target="_blank">🗺️</a>
    </div>
  </div>
  <div class="emergency-item">
    <span class="emergency-name">유람선 매표소</span>
    <div class="emergency-actions">
      <a class="emergency-call" href="tel:043-647-4566">📞 전화</a>
    </div>
  </div>

function makeStopMarker(stop, label, isDay2) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:36px; height:36px; border-radius:50%;
      background:${stop.color};
      border:3px solid white;
      box-shadow:0 3px 10px rgba(0,0,0,0.25);
      display:flex; align-items:center; justify-content:center;
      font-size:14px;
    ">${stop.icon}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22]
  });

  const tagsHtml = (stop.tags || []).map(tag =>
    `<span style="font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;background:#fff0f7;color:#e0607e;">${tag.t}</span>`
  ).join('');

  const warnHtml = stop.warn
    ? `<div style="margin-top:6px;background:#fff8f0;border-radius:8px;padding:5px 8px;font-size:11px;color:#e67e22;font-weight:600;">${stop.warn}</div>`
    : '';

  const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(map);
  marker.bindPopup(`
    <div>
      <div class="popup-head" style="background:${stop.color}">${stop.icon} ${stop.name}</div>
      <div class="popup-body">
        <div class="popup-time">${stop.time}</div>
        <div style="font-size:12px;line-height:1.6;">${stop.desc}</div>
        ${tagsHtml ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${tagsHtml}</div>` : ''}
        ${warnHtml}
      </div>
    </div>
  `, { className: 'custom-popup', maxWidth: 270 });

  return marker;
}

        </div>`
      : '';

    const isNavStop = stop.lat && stop.lng && stop.name !== '서울 출발' && stop.name !== '서울 귀경';

        ${pregInfoHtml}
        <div class="card-footer">
          <button class="check-btn" onclick="toggleCheck(event, this)">${isChecked ? '✓ 다녀왔어요!' : '✓ 다녀왔어요'}</button>
          ${isNavStop ? `<a class="nav-btn" href="${navUrl}" target="_blank">🗺️ 길찾기</a>` : ''}
        </div>
      </div>
    `;

    card.addEventListener('click', () => {
      activateStop(container, markers, card, stop, i, isDay2);
    });

    container.appendChild(card);

    // Travel row
    if (stop.travelAfter && i < stops.length - 1) {
      const tr = document.createElement('div');
      tr.className = 'travel-row';
      tr.innerHTML = `<span class="travel-label">🚗 ${stop.travelAfter}</span><div class="travel-line"></div>`;
      container.appendChild(tr);
    }
  });

  // Sync marker click → sidebar highlight
  markers.forEach((m, i) => {
    m.on('click', () => {
      if (currentDay !== (isDay2 ? 2 : 1)) showDay(isDay2 ? 2 : 1);
      setTimeout(() => {
        const cards = container.querySelectorAll('.stop-card');
        if (cards[i]) activateStop(container, markers, cards[i], stops[i], i, isDay2);
      }, 50);
    });
  });
}

// ── ACTIVATE STOP ─────────────────────────────────────────────────────────────

let activeMarkerEl = null;

function activateStop(container, markers, card, stop, idx, isDay2) {
  // 사이드바 카드 활성화
  document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // 이전 마커 ring 제거
  if (activeMarkerEl) {
    const prev = activeMarkerEl.querySelector('.marker-ring');
    if (prev) prev.remove();
  }

  // 지도 이동 + 팝업
  map.flyTo([stop.lat, stop.lng], 14, { duration: 1.2 });
  markers[idx].openPopup();

  // 마커 ring 추가
  const markerContainer = markers[idx].getElement();
  if (markerContainer) {
    const existing = markerContainer.querySelector('.marker-ring');
    if (existing) existing.remove();
    const ring = document.createElement('div');
    ring.className = 'marker-ring' + (isDay2 ? ' day2' : '');
    markerContainer.style.overflow = 'visible';
    markerContainer.appendChild(ring);
    activeMarkerEl = markerContainer;
  }
}

buildTimeline(day1Stops, day1Markers, 'timeline-day1', false);
buildTimeline(day2Stops, day2Markers, 'timeline-day2', true);
updateProgress();

// ── NEARBY PANEL ─────────────────────────────────────────────────────────────

function buildNearbyList(filter) {
  const list = document.getElementById('nearby-list');
  list.innerHTML = '';
  const filtered = filter === '전체'
    ? refPlaces
    : refPlaces.filter(p => p.cat === filter);

  filtered.forEach((p, i) => {
    const idx = refPlaces.indexOf(p);
    const el = document.createElement('div');
    el.className = 'nearby-item';
    el.innerHTML = `
      <div class="nearby-emoji" style="background:${p.bgColor};">${p.icon}</div>
      <div class="nearby-info">
        <div class="nearby-cat" style="color:${p.textColor};">${p.cat}</div>
        <div class="nearby-name">${p.name}</div>
        <div class="nearby-desc">${p.desc}</div>
      </div>
    `;
    el.addEventListener('click', () => {
      map.flyTo([p.lat, p.lng], 15, { duration: 1.2 });
      refMarkers[idx].openPopup();
    });
    list.appendChild(el);
  });
}

buildNearbyList('전체');

function filterCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildNearbyList(cat);
}

// ── TOGGLE NEARBY ────────────────────────────────────────────────────────────

function toggleNearby() {
  panelVisible = !panelVisible;
  const panel = document.getElementById('nearby-panel');
  const btn = document.getElementById('nearby-toggle-btn');
  panel.style.display = panelVisible ? 'flex' : 'none';
  panel.style.flexDirection = 'column';
  btn.textContent = panelVisible ? '✕ 명소 닫기' : '📍 주변 명소';
}

// ── 현재 진행중 일정 자동 하이라이트 ─────────────────────────────────────────

function highlightCurrentStop() {
  const now = new Date();
  // 여행 당일만 작동: 3/28 = day1, 3/29 = day2
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const mins = now.getHours() * 60 + now.getMinutes();

  let targetStops, targetMarkers, containerId, isDay2;
  if (month === 3 && date === 28) {
    targetStops = day1Stops; targetMarkers = day1Markers;
    containerId = 'timeline-day1'; isDay2 = false;
  } else if (month === 3 && date === 29) {
    targetStops = day2Stops; targetMarkers = day2Markers;
    containerId = 'timeline-day2'; isDay2 = true;
  } else {
    return; // 여행 날 아니면 스킵
  }

  // 현재 시간에 해당하는 stop 찾기
  let currentIdx = -1;
  for (let i = 0; i < targetStops.length; i++) {
    const s = targetStops[i];
    if (s.startMins === undefined) continue;
    const nextMins = targetStops[i + 1]?.startMins ?? 1440;
    if (mins >= s.startMins && mins < nextMins) {
      currentIdx = i;
      break;
    }
  }
  if (currentIdx === -1) return;

  // 해당 Day 탭 활성화
  showDay(isDay2 ? 2 : 1);

  // 카드에 "진행중" 배지 추가 (경고 배지와 같은 행에, 경고 뒤에 위치)
  setTimeout(() => {
    const container = document.getElementById(containerId);
    const cards = container.querySelectorAll('.stop-card');
    // 기존 배지 제거
    container.querySelectorAll('.now-badge').forEach(b => b.remove());
    if (cards[currentIdx]) {
      const badgeRow = cards[currentIdx].querySelector('.badge-row');
      const badge = document.createElement('div');
      badge.className = 'now-badge';
      badge.textContent = '▶ 지금 여기!';
      if (badgeRow) badgeRow.appendChild(badge);  // 경고 배지 뒤에 추가

      // 카드 활성화 + 지도 이동
      activateStop(container, targetMarkers, cards[currentIdx], targetStops[currentIdx], currentIdx, isDay2);
    }
  }, 300);
}

// 페이지 로드 시 실행 + 1분마다 갱신
highlightCurrentStop();
setInterval(highlightCurrentStop, 60000);

// ── 체크 완료 토글 ────────────────────────────────────────────────────────────

function getCheckedSet() {
  try { return new Set(JSON.parse(localStorage.getItem('trip_checked') || '[]')); }
  catch { return new Set(); }
}
function saveCheckedSet(set) {
  localStorage.setItem('trip_checked', JSON.stringify([...set]));
}

function toggleCheck(e, btn) {
  e.stopPropagation();
  const card = btn.closest('.stop-card');
  const key = card.dataset.checkKey;
  card.classList.toggle('checked');
  const isChecked = card.classList.contains('checked');
  btn.textContent = isChecked ? '✓ 다녀왔어요!' : '✓ 다녀왔어요';
  const set = getCheckedSet();
  isChecked ? set.add(key) : set.delete(key);
  saveCheckedSet(set);
  updateProgress();
}

function updateProgress() {
  const allCards = document.querySelectorAll('#timeline-day1 .stop-card, #timeline-day2 .stop-card');
  const total = allCards.length;
  const done = document.querySelectorAll('.stop-card.checked').length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-label').textContent = `${done} / ${total} 완료`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── 비상 연락처 토글 ──────────────────────────────────────────────────────────

let emergencyOpen = false;
function toggleEmergency() {
  emergencyOpen = !emergencyOpen;
  document.getElementById('emergency-panel').style.display = emergencyOpen ? 'block' : 'none';
}
// 패널 외부 클릭 시 닫기
document.addEventListener('click', e => {
  if (!e.target.closest('#emergency-btn') && !e.target.closest('#emergency-panel')) {
    emergencyOpen = false;
    document.getElementById('emergency-panel').style.display = 'none';
  }
});

// ── DAY SWITCH ───────────────────────────────────────────────────────────────

function showDay(day) {
  currentDay = day;
  document.getElementById('timeline-day1').style.display = day === 1 ? '' : 'none';
  document.getElementById('timeline-day2').style.display = day === 2 ? '' : 'none';
  document.getElementById('tab-day1').classList.toggle('active', day === 1);
  document.getElementById('tab-day2').classList.toggle('active', day === 2);

  const focusStops = day === 1 ? day1Stops : day2Stops;
  const coords = focusStops.map(s => [s.lat, s.lng]);
  map.fitBounds(L.latLngBounds(coords), { padding: [50, 50], maxZoom: 12 });
  updateProgress();
}
</script>
</body>
